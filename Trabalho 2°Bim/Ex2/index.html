<!DOCTYPE html>
<html lang="PT-BR">

<head>
     <link rel="stylesheet" href="style.css">
    <title>Calculadora IMC</title>
</head>

<body>
    <h1>Calculadora IMC</h1>
    <p>Descubra seu indice de massa corporal atravez deste calculo...
        <br>Para isso nos diga as seguintes informações
    </p>
    <br>
    <input  type="number" id="Peso" placeholder="Qual seu peso (Kg)">
    <br><br>
    <input  type="number" id="Altura" placeholder="Qual sua Altura (M)">
    <br><br>
    <button id="btCalcular">Obter Resultado</button>
    <hr>
    <h2>Resultado</h2>
    <p>Voce é classificado como uma pessoa:</p>
    <br>
    <h3 id="Resultado"></h3>


    <script src="script.js"></script>
</body>

</html>
