<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Calculo Salario</title>
</head>
<body>

    <h1>Calcule o salario de seus funcionarios</h1>
    <p>De acordo com esta tabela, nos forneca os dados solicitado<br> e lhe entregaremos tudo!</p>


    <table border="1">
        <tr>
            <td>Codigo</td>
            <td>Cargo</td>
            <td>Percentual</td>
        </tr>
        <tr>
            <td>101</td>
            <td>Gerente</td>
            <td>10%</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Engenheiro</td>
            <td>20%</td>
        </tr>
        <Tr>
            <td>103</td>
            <td>Tecnico</td>
            <td>30%</td>
        </Tr>
    </table>
    <br><br>


    <Label>Salario do funcionario
        <input id="inpSalario" placeholder="(R$) EX: 1200">
    </Label>
    <br><br>
    <label>Cargo do funcionario. 
        <input id="inpCod" placeholder="Codigo">
    </label>

    
    <hr>
    <h2>Mudanças:</h2>
    
    <H3>Cargo:</H3>
    <p id="Cargo"></p>
    <h3>Salario Antigo:</h3>
    <p id="salAntigo"></p>
    <h3>Salario Novo:</h3>
    <p id="salNovo"></p>
    <h3>Aumento de:</h3>
    <p id="Aumento"></p>

    <script src="script.js"></script>
</body>
</html>
